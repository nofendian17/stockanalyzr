syntax = "proto3";

package user.v1;

option go_package = "stockanalyzr/pkg/gen;userv1";

service UserService {
	rpc Register(RegisterRequest) returns (RegisterResponse);
	rpc Login(LoginRequest) returns (LoginResponse);
	rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
	rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
	rpc SoftDeleteUser(SoftDeleteUserRequest) returns (SoftDeleteUserResponse);
	rpc RestoreUser(RestoreUserRequest) returns (RestoreUserResponse);
	rpc GetDeletedUsers(GetDeletedUsersRequest) returns (GetDeletedUsersResponse);
}

message User {
	string id = 1;
	string email = 2;
	string full_name = 3;
	bool disabled = 4;
	int64 created_at_unix_ms = 5;
	int64 updated_at_unix_ms = 6;
	string phone_number = 7;
	optional int64 deleted_at_unix_ms = 8;
}

message AuthToken {
	string access_token = 1;
	int64 access_token_expires_at_unix_ms = 2;
	string refresh_token = 3;
	int64 refresh_token_expires_at_unix_ms = 4;
}

message RegisterRequest {
	string email = 1;
	string password = 2;
	string full_name = 3;
	string phone_number = 4;
}

message RegisterResponse {
	User user = 1;
}

message LoginRequest {
	string email = 1;
	string password = 2;
}

message LoginResponse {
	User user = 1;
	AuthToken auth_token = 2;
}

message LogoutRequest {
}

message LogoutResponse {
	bool success = 1;
}

message GetProfileRequest {
	string user_id = 1;
}

message GetProfileResponse {
	User user = 1;
}

message UpdateProfileRequest {
	string user_id = 1;
	string full_name = 2;
	string phone_number = 3;
}

message UpdateProfileResponse {
	User user = 1;
}

message SoftDeleteUserRequest {
	string user_id = 1;
}

message SoftDeleteUserResponse {
	bool success = 1;
}

message RestoreUserRequest {
	string user_id = 1;
}

message RestoreUserResponse {
	User user = 1;
}

message GetDeletedUsersRequest {
	int32 limit = 1;
	int32 offset = 2;
}

message GetDeletedUsersResponse {
	repeated User users = 1;
	int32 total = 2;
}
